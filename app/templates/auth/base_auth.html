<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rankevo{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: #6C63FF;
      --text: #E8E8F2;
      --muted: #6B6B90;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070F;
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .auth-wrap {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Fondo animado con partículas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Flashes -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="fixed top-4 right-4 z-50 space-y-2" style="max-width:320px;">
        {% for category, message in messages %}
          <div class="px-4 py-3 rounded-xl text-sm font-semibold shadow-lg
            {% if category == 'danger' %}bg-red-500/20 border border-red-500/40 text-red-300
            {% elif category == 'success' %}bg-green-500/20 border border-green-500/40 text-green-300
            {% elif category == 'warning' %}bg-yellow-500/20 border border-yellow-500/40 text-yellow-300
            {% else %}bg-blue-500/20 border border-blue-500/40 text-blue-300{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="auth-wrap">
    {% block content %}{% endblock %}
  </div>

  <script>
    // ── Partículas animadas (idéntico al login) ──────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function createParticle() {
      return {
        x:     rand(0, W),
        y:     rand(0, H),
        r:     rand(1, 2.5),
        vx:    rand(-0.15, 0.15),
        vy:    rand(-0.15, 0.15),
        alpha: rand(0.2, 0.7),
      };
    }

    for (let i = 0; i < 120; i++) particles.push(createParticle());

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(108,99,255,${p.alpha})`;
        ctx.fill();
      }
      // líneas entre partículas cercanas
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx   = particles[i].x - particles[j].x;
          const dy   = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(108,99,255,${0.12 * (1 - dist / 100)})`;
            ctx.lineWidth   = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>

</body>
</html>
