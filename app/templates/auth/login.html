<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asociación Nueva Talagante</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-white text-center mb-2">🏓 Asociación Nueva Talagante</h1>
        <p class="text-gray-400 text-center mb-6">Inicia sesión para continuar</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="mb-4 p-3 rounded-lg text-sm
                    {% if category == 'danger' %}bg-red-500 text-white
                    {% elif category == 'success' %}bg-green-500 text-white
                    {% else %}bg-yellow-500 text-black{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="text-gray-300 text-sm mb-1 block">Usuario</label>
                <input type="text" name="username" required
                    class="w-full bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="text-gray-300 text-sm mb-1 block">Contraseña</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">
                Ingresar
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-4">
            ¿Eres jugador? <a href="{{ url_for('auth.registro') }}" class="text-blue-400 hover:underline">Solicitar cuenta</a>
        </p>
    </div>
</body>
</html>
